font=JetBrainsMono Nerd Font:size=12
line-height=24px
vertical-letter-offset=3px
initial-window-mode=windowed
pad=0x0 center

[cursor]
color=333333 ff00ff
blink=yes

[colors]
alpha=0.9
background=1c1c1c

[key-bindings]
spawn-terminal=none

[text-bindings]
\x1b[26;5~ = Control+Shift+T
\x1b[6;6~ = Control+Shift+F
